# Wokwi simulation config — DEC-004 tier 2 (Phase 0.7 / #7, full-sim session #62).
#
# Boots the real esp32 firmware in simulation: TM1637 panel, the three zone buttons
# (B1/B2/B3 each run their own zone; any press stops a running zone; >=3 s long-press
# clears a latched fault — DEC-006), and status LEDs on the pump relay, the three zone
# valve FETs, the two diverter legs, and the zone button rings — enough to watch a full
# run sequence (zone -> pump -> unwind, button-driven, live countdown). v1.4: no master
# valve (DEC-012); the pump is the source gate.
#
# Run (#62):
#   1. pio run -e esp32_sim                       # build first; paths below point at the output.
#                                                 # esp32_sim defines TINKLE_SIM -> short valve
#                                                 # travel + run duration so a run is watchable.
#   2. VS Code: F1 -> "Wokwi: Start Simulator"    # needs the (free) Wokwi extension license
#   3. The firmware joins Wokwi-GUEST by itself (empty sim NVS -> TINKLE_SIM default
#      creds), NTP syncs, and the SPA/API forward to the host: http://localhost:8180/
#      (remote VPS: let VS Code forward 8180, or tunnel it).
#
# Flow sensor: the sim firmware generates its own fake hall pulses — a 15 Hz LEDC
# square wave on GPIO19 (TINKLE_SIM only; ~2.0 GPM at the 450 K seed), looped back
# to GPIO27 in the diagram through the "FLOW on/off" slide switch. The switch BOOTS
# QUIET (flow-on at boot would cross the 50-pulse idle threshold in ~3.3 s and latch
# FAULT_UNEXPECTED_FLOW unprovoked). Slide it up as a run starts (the ~2 s staging
# + 3 s grace leave room); down mid-run to provoke FAULT_NO_FLOW; up while idle to
# provoke FAULT_UNEXPECTED_FLOW (50 pulses over a 5 s window).
#
# Diagram omits LED series resistors (sim convenience); the breadboard bench (tier 3)
# uses real current-limiting per the wiring doc.

[wokwi]
version = 1
firmware = ".pio/build/esp32_sim/firmware.bin"
elf = ".pio/build/esp32_sim/firmware.elf"

# SPA + API reachable from a host browser against the simulated device (#62).
[[net.forward]]
from = "localhost:8180"
to = "target:80"
