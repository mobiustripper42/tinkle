; Tinkle — irrigation controller. Two MCUs + host tests in one project.
;
; Layout:
;   src/esp32   — ESP32 firmware (Arduino-ESP32)
;   src/attiny  — ATtiny85 safety watchdog (separate binary)
;   src/core    — platform-independent logic, host-testable (state machine,
;                 scheduler, fert policy, flow math). Compiled into esp32 AND native.
;   test/       — native unit tests (Unity)
;
; This is the Phase-0 starting skeleton; lib_deps and upload protocols get
; pinned down as the build comes online.

[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev            ; generic DevKitC 38-pin
framework = arduino
monitor_speed = 115200
build_src_filter = +<esp32/> +<core/>
; Regenerate src/esp32/spa_gz.h from web/index.html before every build (#59) —
; the served SPA can't go stale, and the <50 KB gzip budget is a build gate.
extra_scripts = pre:tools/build_spa.py
lib_deps =
    esphome/ESPAsyncWebServer-esphome
    bblanchon/ArduinoJson@^7
    ; v1.5 (DEC-019) is phone-only — the TM1637 display is gone, so the
    ; robtillaart/TM1637_RT driver (DEC-005) is no longer a dependency.

; Wokwi simulation build — identical to esp32 but defines TINKLE_SIM, which shortens
; the valve travel + default run duration (src/core) so a run is watchable in seconds.
; NOT for real hardware: build/flash `esp32`, not this. wokwi.toml points here.
;   pio run -e esp32_sim   then start the simulator.
[env:esp32_sim]
extends = env:esp32
build_flags = -D TINKLE_SIM

[env:attiny85]
platform = atmelavr
board = attiny85            ; board default f_cpu = 8000000L — MUST match the 8 MHz lfuse below
framework = arduino
build_src_filter = +<attiny/>
;
; --- Flashing the watchdog (one-time, per chip) -----------------------------
; The ATtiny85 has no USB. Flash it with an Arduino Uno acting as an ISP bridge.
; Verified procedure (no Arduino IDE needed — all CLI):
;
;   1. Turn the Uno into a programmer: build the stock ArduinoISP sketch in its
;      own throwaway pio project (board = uno) and upload it to the Uno. Source:
;      arduino/arduino-examples -> examples/11.ArduinoISP/ArduinoISP/ArduinoISP.ino
;   2. Wire Uno -> ATtiny (ATtiny DIP-8 pin numbers):
;        Uno 13 -> pin 7 (SCK)    Uno 10 -> pin 1 (RESET)
;        Uno 12 -> pin 6 (MISO)   Uno 5V -> pin 8 (Vcc)
;        Uno 11 -> pin 5 (MOSI)   Uno GND-> pin 4 (GND)
;      Add a 10uF cap across the Uno's RESET->GND (short leg to GND) so the Uno
;      doesn't auto-reset when avrdude opens the port ("not in sync" otherwise).
;   3. Build the .hex, then burn the fuse + flash with avrdude through the Uno.
;      (The pio `-t fuses`/`-t upload` targets do NOT pass the port to a stk500v1
;       programmer — they error "can't open device unknown" — so drive avrdude
;       directly. This is the verified path; three chips brought up this way.)
;        AVRD=~/.platformio/packages/tool-avrdude/avrdude
;        CONF=~/.platformio/packages/tool-avrdude/avrdude.conf
;        pio run -e attiny85                              # produces firmware.hex
;        $AVRD -C $CONF -c stk500v1 -P /dev/ttyACM0 -b 19200 -p attiny85 -U lfuse:w:0xE2:m
;        $AVRD -C $CONF -c stk500v1 -P /dev/ttyACM0 -b 19200 -p attiny85 \
;              -U flash:w:.pio/build/attiny85/firmware.hex:i
;
;   Factory lfuse is 0x62 (1 MHz, CKDIV8 on); 0xE2 gives the 8 MHz the firmware's
;   2 s timeout assumes — wrong clock => every timer runs 8x slow. hfuse 0xDF /
;   efuse 0xFF are the safe defaults (RESET pin kept enabled => still ISP-able).
;   Runtime: power the ATtiny at 3.3 V (NOT 5 V) so the ESP32's 3.3 V heartbeat
;   clears the AVR input threshold cleanly (see src/attiny/main.cpp, PB2 note).
;
upload_protocol = stk500v1
upload_speed = 19200
upload_port = /dev/ttyACM0   ; the Uno's port — adjust per machine: ls /dev/ttyACM*
board_fuses.lfuse = 0xE2     ; 8 MHz internal RC, CKDIV8 off
board_fuses.hfuse = 0xDF     ; default — RESET enabled, SPI enabled, BOD off
board_fuses.efuse = 0xFF     ; default

[env:native]
platform = native
build_src_filter = +<core/>
; Match the firmware's language standard so the host tier compiles src/core under
; the SAME rules as the ESP32 (arduino-esp32 2.0.x pins -std=gnu++11). Without this
; the host GCC defaults to a newer standard, so code that's illegal on-target (e.g.
; aggregate-init of a struct with default member initializers, legal only in C++14+)
; can still pass `pio test` and then fail the firmware build. Keep these in lockstep.
build_flags = -std=gnu++11 -I src/core
test_framework = unity
test_build_src = yes         ; link src/core (build_src_filter) into the test binary
; ArduinoJson is header-only and host-clean — the §10 Api policy (src/core/api.cpp)
; is tested against the real wire shapes, not a parallel model. Keep the major in
; lockstep with the esp32 env.
lib_deps = bblanchon/ArduinoJson@^7
