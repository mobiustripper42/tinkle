; Tinkle — irrigation controller. Two MCUs + host tests in one project.
;
; Layout:
;   src/esp32   — ESP32 firmware (Arduino-ESP32)
;   src/attiny  — ATtiny85 safety watchdog (separate binary)
;   src/core    — platform-independent logic, host-testable (state machine,
;                 scheduler, fert policy, flow math). Compiled into esp32 AND native.
;   test/       — native unit tests (Unity)
;
; This is the Phase-0 starting skeleton; lib_deps and upload protocols get
; pinned down as the build comes online.

[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev            ; generic DevKitC 38-pin
framework = arduino
monitor_speed = 115200
build_src_filter = +<esp32/> +<core/>
lib_deps =
    esphome/ESPAsyncWebServer-esphome
    bblanchon/ArduinoJson
    avishorp/TM1637
    ; starting set — confirm/trim in Phase 0

[env:attiny85]
platform = atmelavr
board = attiny85
framework = arduino
build_src_filter = +<attiny/>
; upload_protocol = usbasp   ; or arduino-as-isp / micronucleus — set on bench

[env:native]
platform = native
build_src_filter = +<core/>
build_flags = -I src/core    ; let test/ #include "valve_driver.h" et al. directly
test_framework = unity
test_build_src = yes         ; link src/core (build_src_filter) into the test binary
